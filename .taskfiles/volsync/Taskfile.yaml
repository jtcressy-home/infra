---
version: "3"

x-task-vars: &task-vars
  app: '{{.app}}'
  ns: '{{.ns}}'
  ts: '{{.ts}}'

vars:
  waitForJobScript: "{{.ROOT_DIR}}/.taskfiles/volsync/wait-for-job.sh"
  listJobTemplate: "{{.ROOT_DIR}}/.taskfiles/volsync/ListJob.tmpl.yaml"
  unlockJobTemplate: "{{.ROOT_DIR}}/.taskfiles/volsync/UnlockJob.tmpl.yaml"
  ts: '{{now | date "150405"}}'

tasks:

  list:
    desc: List all snapshots taken by restic for a given app (ex. task volsync:list app=plex [ns=default])
    silent: true
    cmds:
      - envsubst < {{.listJobTemplate}} | kubectl apply -f -
      - bash {{.waitForJobScript}} list-{{.app}}-{{.ts}} {{.ns}}
      - kubectl -n {{.ns}} wait job/list-{{.app}}-{{.ts}} --for condition=complete --timeout=1m
      - kubectl -n {{.ns}} logs job/list-{{.app}}-{{.ts}} --container list
      - kubectl -n {{.ns}} delete job list-{{.app}}-{{.ts}}
    vars:
      app: '{{ or .app (fail "Variable `app` is required") }}'
      ns: '{{.ns | default "default"}}'
    env: *task-vars
    preconditions:
      - sh: test -f {{.waitForJobScript}}
      - sh: test -f {{.listJobTemplate}}

  unlock:
    desc: Unlocks restic repository for a given app (ex. task volsync:unlock app=plex [ns=default])
    silent: true
    cmds:
      - envsubst < <(cat {{.unlockJobTemplate}}) | kubectl apply -f -
      - bash {{.waitForJobScript}} unlock-{{.app}}-{{.ts}} {{.ns}}
      - kubectl -n {{.ns}} wait job/unlock-{{.app}}-{{.ts}} --for condition=complete --timeout=1m
      - kubectl -n {{.ns}} logs job/unlock-{{.app}}-{{.ts}} --container unlock
      - kubectl -n {{.ns}} delete job unlock-{{.app}}-{{.ts}}
    vars:
      app: '{{ or .app (fail "Variable `app` is required") }}'
      ns: '{{.ns | default "default"}}'
    env: *task-vars
    preconditions:
      - sh: test -f {{.waitForJobScript}}
      - sh: test -f {{.unlockJobTemplate}}

  # To run backup jobs in parallel for all replicationsources:
  #  - kubectl get replicationsources --all-namespaces --no-headers | awk '{sub(/-rsrc$/,"",$2); print $2, $1}' | xargs --max-procs=4 -l bash -c 'task volsync:snapshot app=$0 ns=$1'
  #
  snapshot:
    desc: Trigger a Restic ReplicationSource snapshot (ex. task volsync:snapshot app=plex [ns=default])
    cmds:
      - kubectl -n {{.ns}} patch replicationsources {{.app}}-rsrc --type merge -p '{"spec":{"trigger":{"manual":"{{.ts}}"}}}'
      - bash {{.waitForJobScript}} volsync-src-{{.app}}-rsrc {{.ns}}
      - kubectl -n {{.ns}} wait job/volsync-src-{{.app}}-rsrc --for condition=complete --timeout=120m
      # TODO: Find a way to output logs
      # Error from server (NotFound): jobs.batch "volsync-src-zzztest" not found
      - kubectl -n {{.ns}} logs job/volsync-src-{{.app}}-rsrc
    vars:
      app: '{{ or .app (fail "Variable `app` is required") }}'
      ns: '{{.ns | default "default"}}'
    env: *task-vars
    preconditions:
      - sh: test -f {{.waitForJobScript}}
      - sh: kubectl -n {{.ns}} get replicationsources {{.app}}-rsrc
        msg: "ReplicationSource '{{.app}}-rsrc' not found in namespace '{{.ns}}'"

  restore:
    desc: Restore an app PVC from VolSync using the volume populator pattern (ex. task volsync:restore app=tautulli [ns=media])
    cmds:
      # Preflight
      - task: restore-preflight
        vars: &restore-vars
          app: '{{.app}}'
          ns: '{{.ns}}'
          ts: '{{.ts}}'
      # Actions (set up dominoes)
      - task: restore-scale-down
        vars: *restore-vars
      - task: restore-delete-pvc
        vars: *restore-vars
      - task: restore-trigger-rdst
        vars: *restore-vars
      - task: restore-sync-argocd
        vars: *restore-vars
      # Waits (dominoes fall)
      - task: restore-wait
        vars: *restore-vars
    vars:
      app: '{{ or .app (fail "Variable `app` is required (ex. task volsync:restore app=tautulli ns=media)") }}'
      ns: '{{.ns | default "default"}}'

  # Verify the volume populator chain is correctly configured
  restore-preflight:
    internal: true
    silent: true
    cmds:
      - |
        echo "==> Preflight: checking volume populator chain for '{{.app}}' in namespace '{{.ns}}'..."
        FAIL=0

        # PVC exists and has correct dataSourceRef
        echo -n "  PVC '{{.app}}' exists with dataSourceRef -> '{{.app}}-rdst'... "
        DSR=$(kubectl -n {{.ns}} get pvc {{.app}} -o jsonpath='{.spec.dataSourceRef.name}' 2>/dev/null)
        if [ "$DSR" != "{{.app}}-rdst" ]; then
          echo "FAIL (got '$DSR')"
          FAIL=1
        else
          echo "OK"
        fi

        # ReplicationDestination exists
        echo -n "  ReplicationDestination '{{.app}}-rdst' exists... "
        if ! kubectl -n {{.ns}} get replicationdestination {{.app}}-rdst >/dev/null 2>&1; then
          echo "FAIL (not found)"
          FAIL=1
        else
          echo "OK"
        fi

        # rdst copyMethod is Snapshot
        echo -n "  rdst copyMethod is 'Snapshot'... "
        CM=$(kubectl -n {{.ns}} get replicationdestination {{.app}}-rdst -o jsonpath='{.spec.restic.copyMethod}' 2>/dev/null)
        if [ "$CM" != "Snapshot" ]; then
          echo "FAIL (got '$CM')"
          FAIL=1
        else
          echo "OK"
        fi

        # Restic repository secret exists and has data
        echo -n "  Restic repository secret '{{.app}}-restic-secret' exists with data... "
        SECRET_KEYS=$(kubectl -n {{.ns}} get secret {{.app}}-restic-secret -o jsonpath='{.data}' 2>/dev/null)
        if [ -z "$SECRET_KEYS" ] || [ "$SECRET_KEYS" = "{}" ]; then
          echo "FAIL (secret missing or empty)"
          FAIL=1
        else
          echo "OK"
        fi

        # StorageClass referenced by rdst exists
        SC=$(kubectl -n {{.ns}} get replicationdestination {{.app}}-rdst -o jsonpath='{.spec.restic.storageClassName}' 2>/dev/null)
        echo -n "  StorageClass '$SC' exists... "
        if ! kubectl get storageclass "$SC" >/dev/null 2>&1; then
          echo "FAIL (not found)"
          FAIL=1
        else
          echo "OK"
        fi

        # VolumeSnapshotClass referenced by rdst exists
        VSC=$(kubectl -n {{.ns}} get replicationdestination {{.app}}-rdst -o jsonpath='{.spec.restic.volumeSnapshotClassName}' 2>/dev/null)
        echo -n "  VolumeSnapshotClass '$VSC' exists... "
        if ! kubectl get volumesnapshotclass "$VSC" >/dev/null 2>&1; then
          echo "FAIL (not found)"
          FAIL=1
        else
          echo "OK"
        fi

        # ReplicationSource exists and has completed at least one backup
        echo -n "  ReplicationSource '{{.app}}-rsrc' has a successful backup... "
        RESULT=$(kubectl -n {{.ns}} get replicationsource {{.app}}-rsrc -o jsonpath='{.status.latestMoverStatus.result}' 2>/dev/null)
        if [ "$RESULT" != "Successful" ]; then
          echo "FAIL (latestMoverStatus.result='$RESULT')"
          FAIL=1
        else
          echo "OK"
        fi

        if [ $FAIL -ne 0 ]; then
          echo ""
          echo "==> Preflight FAILED. Fix the issues above before restoring."
          exit 1
        fi
        echo "==> Preflight passed."

  # Scale down the app controller and wait for pods to terminate
  restore-scale-down:
    internal: true
    silent: true
    cmds:
      - |
        APP="{{.app}}"
        NS="{{.ns}}"

        echo "==> Detecting controller for '$APP' in namespace '$NS'..."
        CONTROLLER=""
        if kubectl -n $NS get deployment.apps/$APP >/dev/null 2>&1; then
          CONTROLLER="deployment.apps/$APP"
        elif kubectl -n $NS get statefulset.apps/$APP >/dev/null 2>&1; then
          CONTROLLER="statefulset.apps/$APP"
        elif kubectl -n $NS get cronjob.batch/$APP >/dev/null 2>&1; then
          CONTROLLER="cronjob.batch/$APP"
        else
          echo "ERROR: No deployment, statefulset, or cronjob found for '$APP'"
          exit 1
        fi
        echo "  Found: $CONTROLLER"

        echo "==> Scaling down $CONTROLLER..."
        if [[ "$CONTROLLER" == cronjob.batch/* ]]; then
          kubectl -n $NS patch $CONTROLLER -p '{"spec":{"suspend":true}}'
        else
          kubectl -n $NS scale $CONTROLLER --replicas 0
        fi

        echo "==> Waiting for pods to terminate..."
        kubectl -n $NS wait pod --for=delete \
          --selector="app.kubernetes.io/name=$APP" --timeout=2m 2>/dev/null || true

  # Delete the app PVC
  restore-delete-pvc:
    internal: true
    silent: true
    cmds:
      - |
        echo "==> Deleting PVC '{{.app}}'..."
        kubectl -n {{.ns}} delete pvc {{.app}} --wait=true --timeout=2m 2>/dev/null \
          || echo "  PVC already absent, continuing."

  # Bump the rdst manual trigger to start a restore job
  restore-trigger-rdst:
    internal: true
    silent: true
    cmds:
      - |
        echo "==> Triggering ReplicationDestination '{{.app}}-rdst' with manual trigger '{{.ts}}'..."
        kubectl -n {{.ns}} patch replicationdestination {{.app}}-rdst \
          --type merge -p '{"spec":{"trigger":{"manual":"{{.ts}}"}}}'

  # Trigger ArgoCD sync to recreate the PVC with dataSourceRef
  restore-sync-argocd:
    internal: true
    silent: true
    cmds:
      - |
        APP="{{.app}}"

        echo "==> Finding ArgoCD application for '$APP'..."
        ARGO_APP=$(kubectl -n argocd get app -o name | grep "$APP" | head -1)
        if [ -z "$ARGO_APP" ]; then
          echo "ERROR: No ArgoCD application found matching '$APP'"
          echo "You may need to manually recreate the PVC."
          exit 1
        fi
        ARGO_APP_NAME="${ARGO_APP#*/}"
        echo "  Found: $ARGO_APP_NAME"

        echo "==> Triggering ArgoCD sync on '$ARGO_APP_NAME'..."
        kubectl -n argocd patch app "$ARGO_APP_NAME" \
          --type json -p '[{"op":"remove","path":"/operation"}]' 2>/dev/null || true
        kubectl -n argocd patch app "$ARGO_APP_NAME" \
          --type merge -p '{"operation":{"initiatedBy":{"username":"task-volsync-restore"},"sync":{}}}'

  # Wait for the cascade: rdst snapshot ready -> PVC Bound -> app healthy
  restore-wait:
    internal: true
    silent: true
    cmds:
      - |
        APP="{{.app}}"
        NS="{{.ns}}"

        # 1. Wait for rdst snapshot to be ready
        echo "==> Waiting for VolSync restore job to appear..."
        for i in $(seq 1 60); do
          if kubectl -n $NS get job volsync-dst-${APP}-rdst >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done

        echo "==> Waiting for VolSync restore job to complete (timeout 30m)..."
        kubectl -n $NS wait job/volsync-dst-${APP}-rdst \
          --for condition=complete --timeout=30m

        echo "==> Waiting for rdst lastManualSync to match trigger '{{.ts}}'..."
        for i in $(seq 1 30); do
          LMS=$(kubectl -n $NS get replicationdestination ${APP}-rdst \
            -o jsonpath='{.status.lastManualSync}')
          if [ "$LMS" = "{{.ts}}" ]; then
            break
          fi
          sleep 2
        done

        echo "==> Waiting for VolumeSnapshot to be ready..."
        SNAP=""
        for i in $(seq 1 30); do
          SNAP=$(kubectl -n $NS get replicationdestination ${APP}-rdst \
            -o jsonpath='{.status.latestImage.name}')
          if [ -n "$SNAP" ] && kubectl -n $NS get volumesnapshot "$SNAP" >/dev/null 2>&1; then
            break
          fi
          sleep 2
        done
        if [ -z "$SNAP" ]; then
          echo "ERROR: No latestImage found on rdst after restore completed"
          exit 1
        fi
        echo "  Snapshot: $SNAP"
        kubectl -n $NS wait volumesnapshot "$SNAP" \
          --for=jsonpath='{.status.readyToUse}'=true --timeout=5m
        echo "==> Snapshot '$SNAP' is ready."

        # 2. Wait for PVC to be Bound
        echo "==> Waiting for PVC '$APP' to be recreated and Bound (timeout 5m)..."
        for i in $(seq 1 150); do
          PHASE=$(kubectl -n $NS get pvc $APP -o jsonpath='{.status.phase}' 2>/dev/null || true)
          if [ "$PHASE" = "Bound" ]; then
            break
          fi
          sleep 2
        done
        PHASE=$(kubectl -n $NS get pvc $APP -o jsonpath='{.status.phase}' 2>/dev/null || true)
        if [ "$PHASE" != "Bound" ]; then
          echo "ERROR: PVC '$APP' did not become Bound (current phase: '$PHASE')"
          echo "Check ArgoCD sync status and volume populator logs."
          exit 1
        fi
        echo "==> PVC '$APP' is Bound."

        # 3. Scale up and wait for healthy
        echo "==> Scaling up app..."
        CONTROLLER=""
        if kubectl -n $NS get deployment.apps/$APP >/dev/null 2>&1; then
          CONTROLLER="deployment.apps/$APP"
        elif kubectl -n $NS get statefulset.apps/$APP >/dev/null 2>&1; then
          CONTROLLER="statefulset.apps/$APP"
        elif kubectl -n $NS get cronjob.batch/$APP >/dev/null 2>&1; then
          CONTROLLER="cronjob.batch/$APP"
        fi

        if [[ "$CONTROLLER" == cronjob.batch/* ]]; then
          kubectl -n $NS patch $CONTROLLER -p '{"spec":{"suspend":false}}'
          echo "==> Restore complete! CronJob '$APP' resumed."
        else
          kubectl -n $NS scale $CONTROLLER --replicas 1
          echo "==> Waiting for $CONTROLLER to be ready (timeout 5m)..."
          kubectl -n $NS rollout status $CONTROLLER --timeout=5m
          echo "==> Restore complete! App '$APP' is running with restored data."
        fi