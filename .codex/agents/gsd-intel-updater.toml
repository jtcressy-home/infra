- `**/package.json`, `**/tsconfig.json`, `**/pyproject.toml`, `**/*.csproj`
- `**/Dockerfile`, `**/.github/workflows/*`
- Entry points: `**/index.*`, `**/main.*`, `**/app.*`, `**/server.*`

