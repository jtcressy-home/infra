# OpenClaw SIP voice network allow-list.
#
# SIP/RTP traffic is expected to use the Multus macvlan interface. Cilium
# NetworkPolicy enforcement on that interface still needs live validation, but
# this policy keeps the POC's egress explicit. Ingress enforcement is left open
# because kubelet host probes are not reliably expressible with plain
# Kubernetes NetworkPolicy on this Cilium setup; a stricter ingress policy
# should use a deliberate CiliumNetworkPolicy follow-up.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-sip-voice-unifi-sip-rtp
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: openclaw-sip-voice
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 192.168.20.1/32
      ports:
        - protocol: UDP
          port: 5060
        - protocol: UDP
          port: 10000
          endPort: 10019
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
