# Gateway-visible credentials for the isolated SIP voice OpenClaw instance.
# Keep this set to GEMINI_API_KEY only; SIP credentials belong exclusively in
# external-secret-sip.yaml for the bridge sidecar.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-sip-voice-api-keys
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-sip-voice-api-keys
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: openclaw-sip-voice
        property: GEMINI_API_KEY
