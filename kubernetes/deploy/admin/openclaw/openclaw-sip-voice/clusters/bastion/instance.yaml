# Isolated OpenClaw SIP voice POC instance. This intentionally does not mutate
# or share state with OpenClawInstance/openclaw-gw.
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw-sip-voice
  namespace: openclaw
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    # Match the audited bastion gateway overlay baseline.
    tag: 2026.5.4

  envFrom:
    - secretRef:
        name: openclaw-sip-voice-api-keys

  config:
    configMapRef:
      name: openclaw-sip-voice-config
      key: openclaw.json
    format: json
    mergeMode: overwrite

  extraVolumes:
    - name: sip-voice-plugin
      image:
        reference: ghcr.io/jtcressy/openclaw-sip-voice-plugin@sha256:ec51e7e563b70a776605049b63f2612581c053d3e49f428cce98c95fc9617134
        pullPolicy: IfNotPresent

  extraVolumeMounts:
    - name: sip-voice-plugin
      mountPath: /opt/openclaw-plugins/sip-voice
      readOnly: true

  tailscale:
    enabled: false

  storage:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: zfs-nvme
      accessModes:
        - ReadWriteOnce
      orphan: true

  networking:
    service:
      type: ClusterIP

  resources:
    requests:
      cpu: 250m
      memory: 96Mi
    limits:
      cpu: "1"
      memory: 1Gi
