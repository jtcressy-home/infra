# Isolated OpenClaw SIP voice POC instance. This intentionally does not mutate
# or share state with OpenClawInstance/openclaw-gw.
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw-sip-voice
  namespace: openclaw
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    # Match the audited bastion gateway overlay baseline.
    tag: 2026.5.4

  envFrom:
    - secretRef:
        name: openclaw-sip-voice-api-keys

  config:
    raw:
      plugins:
        load:
          paths:
            - /opt/openclaw-plugins/sip-voice
        entries:
          sip-voice:
            enabled: true
            config:
              bridge:
                url: ws://openclaw-sip-voice-bridge.openclaw.svc.cluster.local:9077
              maxConcurrentCalls: 1
              audio:
                format: g711-ulaw-8khz
              realtime:
                provider: google
                model: gemini-3.1-flash-live-preview
                toolPolicy: safe-read-only
                providers:
                  google:
                    apiKey: ${GEMINI_API_KEY}
                    voice: Kore
    format: json
    mergeMode: overwrite

  extraVolumes:
    - name: sip-voice-plugin
      image:
        reference: ghcr.io/jtcressy/openclaw-sip-voice-plugin@sha256:bb9ec03ee81921e9fe7777bfea6a32a7e8d1aa0e569463516f7442b5da9cf344
        pullPolicy: IfNotPresent

  extraVolumeMounts:
    - name: sip-voice-plugin
      mountPath: /opt/openclaw-plugins/sip-voice
      readOnly: true

  tailscale:
    enabled: false

  storage:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: zfs-nvme
      accessModes:
        - ReadWriteOnce
      orphan: true

  networking:
    service:
      type: ClusterIP

  resources:
    requests:
      cpu: 250m
      memory: 96Mi
    limits:
      cpu: "1"
      memory: 1Gi
