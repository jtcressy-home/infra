# Bridge-only SIP credentials. This Secret is referenced only from the
# openclaw-sip-voice-bridge sidecar envFrom and must not be added to
# spec.envFrom on the OpenClawInstance.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-sip-voice-sip
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-sip-voice-sip
    creationPolicy: Owner
  data:
    - secretKey: UNIFI_TALK_SIP_SERVER
      remoteRef:
        key: openclaw-sip-voice
        property: UNIFI_TALK_SIP_SERVER
    - secretKey: UNIFI_TALK_SIP_USERNAME
      remoteRef:
        key: openclaw-sip-voice
        property: UNIFI_TALK_SIP_USERNAME
    - secretKey: UNIFI_TALK_SIP_PASSWORD
      remoteRef:
        key: openclaw-sip-voice
        property: UNIFI_TALK_SIP_PASSWORD
    - secretKey: UNIFI_TALK_SIP_EXTENSION
      remoteRef:
        key: openclaw-sip-voice
        property: UNIFI_TALK_SIP_EXTENSION
