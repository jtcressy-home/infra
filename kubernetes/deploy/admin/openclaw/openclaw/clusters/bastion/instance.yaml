# OpenClawInstance: the single gateway pod for bastion. Fresh start (not a
# migration from rainbowtank), so no spec.restoreFrom. Backup is enabled;
# operator reads S3 credentials from the openclaw-backup overlay's
# ExternalSecret in openclaw-operator-system.
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw-gw
  namespace: openclaw
spec:
  # Image tag omitted — operator/chart defaults pin appVersion.

  # Gateway-visible env (Telegram token only; no R2/Tailscale).
  envFrom:
    - secretRef:
        name: openclaw-api-keys

  # PATH override so the gateway (a Node process) and its spawned children
  # can resolve qmd, uv, and anything else installed by init containers into
  # the PVC at /home/openclaw/.local/bin. The default container PATH does
  # not include that directory, and Node's spawn() inherits the parent
  # process PATH verbatim.
  env:
    - name: PATH
      value: /home/openclaw/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

  # Install @tobilu/qmd into the PVC so the gateway's qmd memory backend
  # has its binary available. Mirrors the operator's own init-uv pattern:
  # idempotent, writes into /data/.local which is the same path the main
  # container sees as /home/openclaw/.local. qmd downloads ~2GB of GGUF
  # models to ~/.cache/qmd on first use — also on the PVC, so models
  # persist across pod restarts.
  #
  # node:24-bookworm-slim has npm; qmd's native deps (better-sqlite3,
  # node-llama-cpp, sqlite-vec) ship prebuilt binaries for linux/x64 so no
  # build toolchain is required.
  initContainers:
    - name: init-qmd
      image: node:24-bookworm-slim
      command:
        - sh
        - -c
        - |
          set -e
          if [ -x /data/.local/bin/qmd ]; then
            echo "qmd already installed: $(/data/.local/bin/qmd --version 2>/dev/null || echo unknown)"
            exit 0
          fi
          export HOME=/tmp
          export NPM_CONFIG_PREFIX=/data/.local
          export NPM_CONFIG_CACHE=/data/.cache/npm
          npm install -g @tobilu/qmd
          /data/.local/bin/qmd --version
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /tmp
          name: tmp

  # Base config checked into Git. mergeMode=replace makes the ConfigMap the
  # sole source of truth for openclaw.json on every reconcile, evicting any
  # residual keys left by prior bad-config merges. Runtime state (paired
  # devices, OAuth profiles) lives in SEPARATE PVC files (devices/paired.json,
  # identity/device.json, auth-profiles.json) and is untouched by replace.
  config:
    configMapRef:
      name: openclaw-config
      key: openclaw.json
    format: json
    mergeMode: overwrite

  # Gateway reverse-proxy sidecar and token auth. The operator creates the
  # environment variable OPENCLAW_GATEWAY_TOKEN from this Secret's "token"
  # key. The Secret itself is produced by external-secret-gateway-token.yaml.
  gateway:
    enabled: true
    existingSecret: openclaw-gw-gateway-token
    controlUiOrigins:
      - https://openclaw-gw.tailnet-4d89.ts.net

  # Tailscale integration DISABLED: exposure is handled by the
  # tailscale-operator-managed ProxyGroup in the openclaw-gw-proxygroup
  # overlay (the tsnet mode baked into OpenClaw itself is redundant here).
  tailscale:
    enabled: false

  # Persistent state: agent workspaces, LLM provider auth profiles (Codex
  # OAuth tokens land here after one-time onboarding), channel connector
  # state. ZFS-over-iSCSI via democratic-csi is the cluster's only durable
  # storage class. orphan=true keeps the PVC around if the instance is
  # deleted.
  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: zfs-nvme
      accessModes:
        - ReadWriteOnce
      orphan: true

  # Kubernetes Service shape. Type ClusterIP — the external exposure is the
  # operator-managed tailscale Service/ProxyGroup, which selects on pod
  # labels.
  networking:
    service:
      type: ClusterIP

  # Scheduled backup to S3/R2. Operator mounts the s3-backup-credentials
  # Secret from OperatorNamespace only on Job/CronJob pods — gateway pod
  # cannot read R2 creds even indirectly.
  backup:
    schedule: "0 3 * * *"
    retentionDays: 14
    historyLimit: 3
    failedHistoryLimit: 3
    timeout: 30m

  # Agents may author their own OpenClawSelfConfig CRs (see selfconfig.yaml)
  # for narrow self-modifications. Operator enforces schema; human review
  # gates any merges into this Git overlay.
  selfConfigure:
    enabled: true
    allowedActions:
      - config
      - skills
      - workspaceFiles

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
