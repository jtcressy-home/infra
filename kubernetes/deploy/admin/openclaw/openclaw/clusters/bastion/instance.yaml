# OpenClawInstance: the single gateway pod for bastion. Fresh start (not a
# migration from rainbowtank), so no spec.restoreFrom. Backup is enabled;
# operator reads S3 credentials from the openclaw-backup overlay's
# ExternalSecret in openclaw-operator-system.
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw-gw
  namespace: openclaw
spec:
  # Pinned so Renovate can track gateway image releases (see renovate.json
  # packageRule for ghcr.io/openclaw/openclaw — non-prerelease bumps
  # automerged; -beta.* tags held by ignoreUnstable). Upstream uses CalVer
  # (YYYY.M.D) so a semver matchUpdateTypes filter is meaningless here —
  # year rollover would be a "major" bump but isn't actually breaking.
  image:
    repository: ghcr.io/openclaw/openclaw
    # renovate: datasource=docker depName=ghcr.io/openclaw/openclaw
    tag: 2026.5.12

  # Gateway-visible env (Telegram token only; no R2/Tailscale).
  envFrom:
    - secretRef:
        name: openclaw-api-keys

  # Base config checked into Git. The referenced ConfigMap is generated from
  # openclaw.json in this overlay and is the only Git-owned openclaw.json base.
  # The operator enriches that base into its generated runtime ConfigMap.
  #
  # Do not set spec.config.raw while configMapRef is active. Current operator
  # behavior ignores raw when configMapRef is set, so raw would become latent
  # state rather than a clear overlay. mergeMode=overwrite restores the
  # generated config into the PVC on pod startup; durable runtime state such as
  # paired devices and OAuth profiles lives in separate PVC files.
  config:
    configMapRef:
      name: openclaw-config
      key: openclaw.json
    format: json
    mergeMode: overwrite

  # Gateway reverse-proxy sidecar and token auth. The operator creates the
  # environment variable OPENCLAW_GATEWAY_TOKEN from this Secret's "token"
  # key. The Secret itself is produced by external-secret-gateway-token.yaml.
  gateway:
    enabled: true
    existingSecret: openclaw-gw-gateway-token
    controlUiOrigins:
      - https://openclaw-gw.tailnet-4d89.ts.net

  # Tailscale integration DISABLED: exposure is handled by the
  # tailscale-operator-managed ProxyGroup in the openclaw-gw-proxygroup
  # overlay (the tsnet mode baked into OpenClaw itself is redundant here).
  tailscale:
    enabled: false

  # Persistent state: agent workspaces, LLM provider auth profiles (Codex
  # OAuth tokens land here after one-time onboarding), channel connector
  # state. ZFS-over-iSCSI via democratic-csi is the cluster's only durable
  # storage class. orphan=true keeps the PVC around if the instance is
  # deleted.
  storage:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: zfs-nvme
      accessModes:
        - ReadWriteOnce
      orphan: true

  # Kubernetes Service shape. Type ClusterIP — the external exposure is the
  # operator-managed tailscale Service/ProxyGroup, which selects on pod
  # labels.
  networking:
    service:
      type: ClusterIP

  # Scheduled backup to S3/R2. Operator mounts the s3-backup-credentials
  # Secret from OperatorNamespace only on Job/CronJob pods — gateway pod
  # cannot read R2 creds even indirectly.
  backup:
    schedule: "0 3 * * *"
    retentionDays: 14
    historyLimit: 3
    failedHistoryLimit: 3
    timeout: 30m

  # Agents may create runtime OpenClawSelfConfig requests for narrow
  # self-modifications. Do not GitOps-manage an OpenClawSelfConfig scaffold in
  # this overlay. configPatch is intentionally not allowed here because it
  # writes spec.config.raw, which is ignored while configMapRef is active.
  # envVars is also withheld because plain environment mutation is broader than
  # the current bootstrap need.
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - workspaceFiles

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
