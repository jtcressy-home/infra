# Tailscale-exposed HTTPS Ingress backed by the openclaw-gw ProxyGroup.
#
# The tailscale-operator routes this Ingress through the ProxyGroup's
# pods (svc:openclaw-gw VIP) instead of spawning a dedicated ts-* proxy
# pod. Combines:
#   - HTTPS termination + automatic cert provisioning (Ingress feature)
#   - Named Tailscale Service + VIP (ProxyGroup feature)
#
# Backend targets the ClusterIP Service the openclaw-operator creates
# (name = instance name "openclaw-gw.tailnet-4d89.ts.net"), port 18789 = gateway sidecar.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-gw
  namespace: openclaw
  annotations:
    tailscale.com/proxy-group: openclaw-gw
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - "openclaw-gw.tailnet-4d89.ts.net"
  rules:
    - host: "openclaw-gw.tailnet-4d89.ts.net"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-gw
                port:
                  number: 18789
