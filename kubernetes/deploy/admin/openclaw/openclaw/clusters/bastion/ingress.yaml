# Tailscale-exposed HTTPS Ingress backed by the openclaw-gw ProxyGroup.
#
# Per tailscale-operator docs (https://tailscale.com/kb/1439/kubernetes-operator-cluster-ingress)
# the ProxyGroup-backed Ingress pattern uses the tailscale.com/hostname
# annotation (derives MagicDNS name = "openclaw-gw.<tailnet>.ts.net") and
# does NOT use a `host` field on the rule (the rule applies to all traffic
# hitting the Tailscale Service VIP). The previous attempt with
# `host: openclaw-gw.tailnet-4d89.ts.net` on the rule was rejected by the
# operator with "rule with host <x> ignored, unsupported".
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-gw
  namespace: openclaw
  annotations:
    tailscale.com/proxy-group: openclaw-gw
    tailscale.com/hostname: openclaw-gw
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: openclaw-gw
      port:
        number: 18789
