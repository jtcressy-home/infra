# Tailscale-exposed HTTPS Ingress backed by the openclaw-gw ProxyGroup.
#
# Per canonical docs (https://tailscale.com/kb/1439/kubernetes-operator-cluster-ingress):
# - Use `defaultBackend` (no rules with `host` — ProxyGroup-mode rejects rule hosts).
# - Set `spec.tls.hosts[0]` to the desired first DNS label. Default otherwise
#   is `<ingress-name>-<namespace>` which produced the mangled
#   "openclaw-gw-openclaw" / "openclaw-openclaw-gw-ingress" forms seen earlier.
# - Do NOT set the `tailscale.com/hostname` annotation — tls.hosts[0] is the
#   source of truth for ProxyGroup-backed Ingresses.
# - Only annotation required: `tailscale.com/proxy-group`.
#
# Final DNS name: openclaw-gw.<tailnet>.ts.net (matches ACL autoApprover on
# svc:openclaw-gw via tailnet-policy repo).
apiVersion: networking.k8s.io/v1
kind: Ingress
# Name must not match the OpenClawInstance: reconcileIngress deletes matching Ingresses when ingress.enabled=false.
metadata:
  name: openclaw-gw-ts
  namespace: openclaw
  annotations:
    tailscale.com/proxy-group: openclaw-gw
    # Tailscale Services created by the operator default to tag:k8s. Override
    # with a dedicated tag so the autoApprover in tailnet-policy can reference
    # it specifically (not all tag:k8s services). Per tailscale-operator docs
    # the autoApprover matches on service tag, not service name.
    tailscale.com/tags: "tag:openclaw-gw"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: openclaw-gw
      port:
        number: 18789
  tls:
    - hosts:
        - openclaw-gw
