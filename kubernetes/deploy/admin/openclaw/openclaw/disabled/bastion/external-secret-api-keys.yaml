# Gateway-visible credentials. These are injected into the OpenClaw container
# as environment variables via spec.envFrom on the OpenClawInstance. Agents
# running inside the gateway pod can read these values — keep this set
# MINIMAL and NEVER add R2/S3 or Tailscale credentials here (see
# external-secret-s3-backup.yaml in the openclaw-backup overlay for the
# blast-radius-isolated operator-only set).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-api-keys
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-api-keys
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: openclaw-gw
        property: TELEGRAM_BOT_TOKEN
    # OpenRouter key exposed as OPENAI_API_KEY because OpenClaw's memory
    # provider=openai reads that env var name and we're pointing its baseUrl
    # at OpenRouter's OpenAI-compatible /v1/embeddings surface. See
    # configmap.yaml agents.defaults.memorySearch.
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: OpenRouter
        property: apikey
