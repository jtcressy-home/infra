apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace is set by the ApplicationSet kustomize.namespace transformer at
# deploy time (derived from the overlay path segment: "openclaw"). Do not
# set a local namespace transformer here.

resources:
  - external-secret-api-keys.yaml
  - external-secret-gateway-token.yaml
  - instance.yaml
  - ingress.yaml
  - netpol.yaml
  - netpol-egress-ollama.yaml

# Git-owned base config. The stable ConfigMap name is required because the
# OpenClawInstance references it through spec.config.configMapRef.
configMapGenerator:
  - name: openclaw-config
    files:
      - openclaw.json
generatorOptions:
  disableNameSuffixHash: true
