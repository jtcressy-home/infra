---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dograh
  annotations:
    link.argocd.argoproj.io/external-link: https://dograh.tailnet-4d89.ts.net
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - dograh
  rules:
    - host: dograh
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: dograh-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dograh-ui
                port:
                  number: 3010
