---
apiVersion: v1
kind: Service
metadata:
  name: dograh-api
  labels:
    app.kubernetes.io/name: dograh-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dograh-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: dograh-ui
  labels:
    app.kubernetes.io/name: dograh-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dograh-ui
  ports:
    - name: http
      port: 3010
      targetPort: 3010
