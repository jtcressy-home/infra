---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dograh-jellyseerr-adapter
  labels:
    app.kubernetes.io/name: dograh-jellyseerr-adapter
    app.kubernetes.io/part-of: dograh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dograh-jellyseerr-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dograh-jellyseerr-adapter
        app.kubernetes.io/part-of: dograh
    spec:
      automountServiceAccountToken: false
      containers:
        - name: adapter
          image: ghcr.io/jtcressy/dograh-jellyseerr-adapter:sha-efcca62@sha256:cb9233cb8cdb5a11cb1d986abb8305b5ea916664c80edfda438a34b7e9291233
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JELLYSEERR_BASE_URL
              value: http://overseerr.media.svc.cluster.local:5055
            - name: JELLYSEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dograh-jellyseerr-adapter-secret
                  key: JELLYSEERR_API_KEY
            - name: JELLYSEERR_API_USER
              valueFrom:
                secretKeyRef:
                  name: dograh-jellyseerr-adapter-secret
                  key: JELLYSEERR_API_USER
            - name: SEARCH_RESULT_LIMIT
              value: "3"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
