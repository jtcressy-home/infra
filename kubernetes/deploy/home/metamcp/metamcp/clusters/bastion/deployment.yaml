---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metamcp
  labels:
    app.kubernetes.io/name: metamcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metamcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metamcp
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18
          envFrom:
            - secretRef:
                name: metamcp-secret
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 128Mi
      containers:
        - name: metamcp
          image: ghcr.io/metatool-ai/metamcp:latest
          ports:
            - containerPort: 12008
              name: http
          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: DATABASE_URL
            - name: POSTGRES_HOST
              value: teslamate-db-rw.teslamate.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: POSTGRES_PASSWORD
            # Application URLs
            - name: APP_URL
              value: https://metamcp.tailnet-4d89.ts.net
            - name: NEXT_PUBLIC_APP_URL
              value: https://metamcp.tailnet-4d89.ts.net
            # OIDC (tsidp)
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_DISCOVERY_URL
              value: https://tsidp.tailnet-4d89.ts.net/.well-known/openid-configuration
            - name: OIDC_SCOPES
              value: openid email profile
            - name: OIDC_PKCE
              value: "true"
            # Session
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: BETTER_AUTH_SECRET
            # Bootstrap (OIDC-only mode)
            - name: BOOTSTRAP_ENABLE
              value: "true"
            - name: BOOTSTRAP_DISABLE_UI_REGISTRATION
              value: "true"
            - name: BOOTSTRAP_DISABLE_SSO_REGISTRATION
              value: "false"
            # Logging
            - name: LOG_LEVEL
              value: info
            # Node.js memory cap to prevent unbounded heap growth
            - name: NODE_OPTIONS
              value: "--max-old-space-size=512"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: obsidian-vault
              mountPath: /obsidian-vault
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
        - name: bluepopcorn-mcp
          image: ghcr.io/jtcressy/bluepopcorn-mcp:rolling@sha256:30a64041bfe935dc9c5c625d27b0796a8648f7ef6d8afaad7cdc586c6148d71f
          ports:
            - containerPort: 9151
              name: bluepopcorn-mcp
          env:
            - name: SEERR_URL
              value: http://overseerr.media.svc.cluster.local:5055
            - name: SEERR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: OVERSEERR_API_KEY
            - name: SEERR_API_USER
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: DOGRAH_AGENT_USER_ID
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: metamcp-secret
                  key: BLUEPOPCORN_MCP_API_KEY
            - name: HTTP_HOST
              value: 0.0.0.0
            - name: HTTP_PORT
              value: "9151"
          readinessProbe:
            httpGet:
              path: /health
              port: 9151
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9151
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 512Mi
        - name: obsidian-sync
          image: ghcr.io/belphemur/obsidian-headless-sync-docker:latest@sha256:2e8731a6cc246af383579478e2719b56efec0a63ac5baae731e88b13b1cc9ab7
          command:
            - /bin/sh
            - -c
            - |
              sed -i 's/exec s6-setuidgid/umask 0002; exec s6-setuidgid/' /etc/s6-overlay/s6-rc.d/svc-obsidian-sync/run
              exec /init
          env:
            - name: OBSIDIAN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: obsidian-sync-secret
                  key: OBSIDIAN_AUTH_TOKEN
            - name: VAULT_NAME
              valueFrom:
                secretKeyRef:
                  name: obsidian-sync-secret
                  key: VAULT_NAME
            - name: VAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obsidian-sync-secret
                  key: VAULT_PASSWORD
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: obsidian-vault
              mountPath: /vault
            - name: obsidian-config
              mountPath: /home/obsidian/.config
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metamcp
        - name: obsidian-vault
          persistentVolumeClaim:
            claimName: obsidian-vault
        - name: obsidian-config
          emptyDir:
            sizeLimit: 100Mi
