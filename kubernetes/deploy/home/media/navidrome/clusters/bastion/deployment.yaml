---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  labels:
    app.kubernetes.io/name: navidrome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: navidrome
  template:
    metadata:
      labels:
        app.kubernetes.io/name: navidrome
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: navidrome
          image: ghcr.io/navidrome/navidrome:0.61.2
          ports:
            - containerPort: 4533
              name: http
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_PORT
              value: "4533"
            - name: ND_SCANSCHEDULE
              value: "@every 15m"
            - name: ND_LOGLEVEL
              value: info
            - name: ND_SESSIONTIMEOUT
              value: 24h
            - name: ND_ENABLETRANSCODINGCONFIG
              value: "true"
            - name: ND_EXTAUTH_USERHEADER
              value: Tailscale-User-Login
            - name: ND_EXTAUTH_TRUSTEDSOURCES
              value: 10.244.0.0/16
          volumeMounts:
            - name: data
              mountPath: /data
            - name: music
              mountPath: /music
              readOnly: true
            - name: cache
              mountPath: /data/cache
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4533
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: 4533
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-config
        - name: music
          nfs:
            server: truenas-purplebox.private.home
            path: /mnt/purple/general/media/music
        - name: cache
          emptyDir:
            sizeLimit: 5Gi
        - name: tmp
          emptyDir: {}
