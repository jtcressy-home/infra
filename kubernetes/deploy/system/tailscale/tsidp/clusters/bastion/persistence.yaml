---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tsidp
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: tsidp-rdst
  resources:
    requests:
      storage: 1Gi
  storageClassName: zfs-nvme
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: tsidp-rdst
spec:
  trigger:
    manual: restore-zfs-snapshot
  restic:
    repository: tsidp-restic-secret
    copyMethod: Snapshot
    accessModes: ["ReadWriteOnce"]
    storageClassName: zfs-nvme
    cacheStorageClassName: zfs-nvme
    volumeSnapshotClassName: zfs-nvme-snapshot
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 65533
      fsGroup: 65533
    capacity: 1Gi
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: tsidp-rsrc
spec:
  sourcePVC: tsidp
  trigger:
    schedule: "15 */8 * * *"
  restic:
    pruneIntervalDays: 7
    repository: tsidp-restic-secret
    copyMethod: Snapshot
    accessModes: ["ReadWriteOnce"]
    storageClassName: zfs-nvme
    cacheStorageClassName: zfs-nvme
    volumeSnapshotClassName: zfs-nvme-snapshot
    moverSecurityContext:
      runAsUser: 1001
      runAsGroup: 65533
      fsGroup: 65533
    retain:
      hourly: 24
      daily: 7
      weekly: 5
