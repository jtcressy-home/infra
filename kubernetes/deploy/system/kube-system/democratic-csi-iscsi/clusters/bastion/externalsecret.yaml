---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zfs-iscsi-purplebox
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-eso-bastion
  target:
    name: zfs-iscsi-purplebox
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: zfs-generic-iscsi
          instance_id: bastion-zfs-iscsi
          sshConnection:
            host: {{ .ZFS_ISCSI_HOST }}
            port: 22
            username: root
            privateKey: |
          {{ .ZFS_ISCSI_SSH_KEY | indent 14 }}
          zfs:
            cli:
              sudoEnabled: false
              paths:
                zfs: /sbin/zfs
                zpool: /sbin/zpool
                sudo: /usr/bin/sudo
            datasetProperties:
              "org.democratic-csi:description": "{{ `{{ parameters.[csi.storage.k8s.io/pvc/namespace] }}/{{ parameters.[csi.storage.k8s.io/pvc/name] }}` }}"
            datasetParentName: nvme-pool/k8s/v
            detachedSnapshotsDatasetParentName: nvme-pool/k8s/s
            zvolCompression: ""
            zvolDedup: ""
            zvolEnableReservation: false
            zvolBlocksize: 16K
          iscsi:
            shareStrategy: "targetCli"
            shareStrategyTargetCli:
              basename: "iqn.2003-01.org.linux-iscsi.purplebox"
              tpg:
                attributes:
                  authentication: 0
                  generate_node_acls: 1
                  cache_dynamic_acls: 1
                  demo_mode_write_protect: 0
              block:
                attributes:
                  emulate_tpu: 0
            targetPortal: "{{ .ZFS_ISCSI_HOST }}:3260"
            targetPortals: []
            interface: ""
            namePrefix: csi-
            nameSuffix: "-bastion"
  data:
    - secretKey: ZFS_ISCSI_SSH_KEY
      remoteRef:
        key: ZFS_ISCSI_SSH_KEY
    - secretKey: ZFS_ISCSI_HOST
      remoteRef:
        key: ZFS_ISCSI_HOST
