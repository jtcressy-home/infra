---
# Repo-managed tailnet Gateway for the ARK dashboard. Mirrors the openshell
# gateway/route split: the Gateway is owned here, the HTTPRoute is rendered by
# the ark-dashboard chart (values-dashboard.yaml). Envoy terminates tailnet TLS
# with a cert-manager cert from the internal-ca cluster issuer; the dashboard is
# reachable at https://ark.tailnet-4d89.ts.net from the tailnet only.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ark-gateway
  namespace: ark-system
  annotations:
    cert-manager.io/cluster-issuer: internal-ca
spec:
  gatewayClassName: eg-tailscale
  # Override the class-default shared EnvoyProxy so this Gateway's Envoy
  # LoadBalancer registers as the `ark` tailnet device (see envoyproxy.yaml).
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: ark-tailscale-proxy
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "ark.tailnet-4d89.ts.net"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: ark-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same  # HTTPRoute lives in the ark-system namespace (same as Gateway)
