---
# ARK dashboard exposed on the tailnet via the Tailscale operator Ingress, which
# terminates TLS with an auto-provisioned, browser-trusted Let's Encrypt cert for
# ark.tailnet-4d89.ts.net. This matches how every other tailnet service in the
# cluster is exposed (argocd, grafana, metamcp, navidrome, ...) and replaces the
# prior Envoy Gateway + cert-manager internal-ca setup, whose private CA caused
# browser TLS warnings.
#
# Note: the Tailscale operator serves HTTPS (443) only via Tailscale Serve; it
# does not listen on port 80, so there is no clean operator-supported HTTP->HTTPS
# 301 redirect. The optional port-80 redirect is therefore intentionally omitted.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ark-dashboard
  namespace: ark-system
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - ark
  rules:
    - host: ark
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ark-dashboard
                port:
                  number: 3000
