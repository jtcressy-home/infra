apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshell

resources:
  - externalsecret.yaml
  - gateway.yaml
  - networkpolicy.yaml

helmCharts:
  - name: helm-chart
    repo: oci://ghcr.io/nvidia/openshell
    version: 0.0.59
    releaseName: openshell
    namespace: openshell
    valuesFile: values.yaml

patches:
  # The chart hardcodes its volumeClaimTemplate with no storageClassName knob and the
  # cluster has no default StorageClass — without this the PVC never binds (pod Pending).
  - target:
      kind: StatefulSet
      name: openshell
    patch: |-
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: zfs-nvme
