apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-openrouter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kagent-openrouter
    creationPolicy: Owner
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: kagent-openrouter
        property: credential
