database:
  postgres:
    urlFile: /etc/kagent-database/uri
    bundled:
      enabled: false

providers:
  openAI:
    apiKeySecretRef: ""
    apiKeySecretKey: ""

controller:
  volumes:
    - name: database
      secret:
        secretName: kagent-db-app
        items:
          - key: uri
            path: uri
  volumeMounts:
    - name: database
      mountPath: /etc/kagent-database
      readOnly: true

# Official kagent minimal profile: install the platform without bundled agents.
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
helm-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
