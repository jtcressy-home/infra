database:
  postgres:
    urlFile: /etc/kagent-database/uri
    bundled:
      enabled: false

providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: anthropic/claude-sonnet-4.6
    apiKeySecretRef: kagent-openrouter
    apiKeySecretKey: OPENROUTER_API_KEY
    config:
      baseUrl: https://openrouter.ai/api/v1

querydoc:
  enabled: false

grafana-mcp:
  enabled: false

controller:
  volumes:
    - name: database
      secret:
        secretName: kagent-db-app
        items:
          - key: uri
            path: uri
  volumeMounts:
    - name: database
      mountPath: /etc/kagent-database
      readOnly: true

# Official kagent minimal profile: install the platform without bundled agents.
k8s-agent:
  enabled: false
kgateway-agent:
  enabled: false
istio-agent:
  enabled: false
promql-agent:
  enabled: false
observability-agent:
  enabled: false
argo-rollouts-agent:
  enabled: false
helm-agent:
  enabled: false
cilium-policy-agent:
  enabled: false
cilium-manager-agent:
  enabled: false
cilium-debug-agent:
  enabled: false
