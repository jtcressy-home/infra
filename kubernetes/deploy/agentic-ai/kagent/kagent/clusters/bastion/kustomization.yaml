apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - openrouter-externalsecret.yaml
  - pg-r2-externalsecret.yaml
  - pg-cluster.yaml
  - pg-backup.yaml
  - ingress.yaml

helmCharts:
  - name: kagent-crds
    repo: oci://ghcr.io/kagent-dev/kagent/helm
    version: 0.9.11
    releaseName: kagent-crds
    namespace: kagent
  - name: kagent
    repo: oci://ghcr.io/kagent-dev/kagent/helm
    version: 0.9.12
    releaseName: kagent
    namespace: kagent
    valuesFile: values.yaml

patches:
  - target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-options
        value: ServerSideApply=true
