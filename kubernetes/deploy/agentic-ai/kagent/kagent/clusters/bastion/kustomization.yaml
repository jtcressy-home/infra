apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pg-r2-externalsecret.yaml
  - pg-cluster.yaml
  - pg-backup.yaml
  - ingress.yaml

helmCharts:
  - name: kagent-crds
    repo: oci://ghcr.io/kagent-dev/kagent/helm
    version: 0.9.9
    releaseName: kagent-crds
    namespace: kagent
  - name: kagent
    repo: oci://ghcr.io/kagent-dev/kagent/helm
    version: 0.9.9
    releaseName: kagent
    namespace: kagent
    valuesFile: values.yaml
