---
# Renders a single .env file (the complete dotenv Hermes reads from
# /opt/data/.env) so ESO + 1Password is the ONE source of truth for runtime
# config. See README.md for why this replaces any config baked into the
# image or left on the PVC.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Discrete key so the Camofox container can consume it via
        # secretKeyRef (the gateway reads its copy from the .env blob).
        CAMOFOX_API_KEY: "{{ .CAMOFOX_API_KEY }}"
        .env: |
          API_SERVER_ENABLED=true
          API_SERVER_HOST=0.0.0.0
          API_SERVER_PORT=8642
          API_SERVER_KEY={{ .API_SERVER_KEY }}
          DISCORD_BOT_TOKEN={{ .DISCORD_BOT_TOKEN }}
          DISCORD_ALLOWED_USERS={{ .DISCORD_ALLOWED_USERS }}
          OPENAI_API_KEY={{ .OPENAI_API_KEY }}
          HERMES_DASHBOARD=1
          HERMES_DASHBOARD_PUBLIC_URL=https://hermes.tailnet-4d89.ts.net
          HERMES_DASHBOARD_OIDC_ISSUER=https://tsidp.tailnet-4d89.ts.net
          HERMES_DASHBOARD_OIDC_CLIENT_ID={{ .HERMES_DASHBOARD_OIDC_CLIENT_ID }}
          HERMES_DASHBOARD_OIDC_CLIENT_SECRET={{ .HERMES_DASHBOARD_OIDC_CLIENT_SECRET }}
          CAMOFOX_URL=http://hermes-camofox.hermes.svc:9377
          CAMOFOX_API_KEY={{ .CAMOFOX_API_KEY }}
  dataFrom:
    - extract:
        key: hermes
