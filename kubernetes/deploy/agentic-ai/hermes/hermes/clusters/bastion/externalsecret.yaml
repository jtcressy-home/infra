---
# Renders a single .env file (the complete dotenv Hermes reads from
# /opt/data/.env) so ESO + 1Password is the ONE source of truth for runtime
# config. See README.md for why this replaces any config baked into the
# image or left on the PVC.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        .env: |
          API_SERVER_ENABLED=true
          API_SERVER_HOST=0.0.0.0
          API_SERVER_PORT=8642
          API_SERVER_KEY={{ .API_SERVER_KEY }}
          DISCORD_BOT_TOKEN={{ .DISCORD_BOT_TOKEN }}
          OPENAI_API_KEY={{ .OPENAI_API_KEY }}
          HERMES_DASHBOARD=1
          CAMOFOX_URL=http://hermes-camofox:9377
  dataFrom:
    - extract:
        key: hermes
