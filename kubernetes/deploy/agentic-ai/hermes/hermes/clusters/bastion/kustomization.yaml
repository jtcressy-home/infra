apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace is set by the ApplicationSet kustomize.namespace transformer at
# deploy time (derived from the overlay path segment: "hermes"). Do not set
# a local namespace transformer here.

resources:
  - externalsecret.yaml
  - hermes-pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - camofox.yaml
