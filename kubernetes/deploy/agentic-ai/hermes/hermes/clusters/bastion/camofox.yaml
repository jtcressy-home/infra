---
# Camofox remote-browser sidecar, run as its own workload rather than a pod
# sidecar so it can be sized/restarted independently of the gateway and
# keep the gateway's single-writer PVC clean.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-camofox
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: zfs-nvme
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-camofox
  labels:
    app.kubernetes.io/name: hermes-camofox
spec:
  replicas: 1
  # Same RWO-single-writer reasoning as the gateway Deployment.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-camofox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-camofox
    spec:
      automountServiceAccountToken: false
      containers:
        - name: camofox
          image: ghcr.io/jtcressy/camofox-browser:1.11.2@sha256:07c48e89160bc47bf23cd79190fa83acbe83d8b3b59dc4979e01c51738a7feee
          imagePullPolicy: IfNotPresent
          env:
            - name: CAMOFOX_PORT
              value: "9377"
            # Camofox writes profiles to ~/.camofox by default (ephemeral).
            # Point it at the mounted PVC so portal logins survive restarts.
            - name: CAMOFOX_PROFILE_DIR
              value: /data
            # Require an API key on the control API (defense-in-depth on top
            # of the NetworkPolicy). Same value the gateway sends via .env.
            - name: CAMOFOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-env
                  key: CAMOFOX_API_KEY
          ports:
            - name: browser
              containerPort: 9377
          volumeMounts:
            - name: hermes-camofox
              mountPath: /data
          startupProbe:
            tcpSocket:
              port: 9377
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 9377
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 9377
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: hermes-camofox
          persistentVolumeClaim:
            claimName: hermes-camofox
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-camofox
spec:
  selector:
    app.kubernetes.io/name: hermes-camofox
  ports:
    - name: browser
      port: 9377
      targetPort: 9377
