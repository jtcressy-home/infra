---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dograh-ui
  labels:
    app.kubernetes.io/name: dograh-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dograh-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dograh-ui
    spec:
      containers:
        - name: dograh-ui
          image: ghcr.io/dograh-hq/dograh-ui:1.42.0@sha256:5160641f15a0302ca03e6ae7bda931a28f7f20ce586115c472931a0f055741e5
          ports:
            - containerPort: 3010
              name: http
          env:
            - name: BACKEND_URL
              value: http://dograh-api.dograh.svc.cluster.local:8000
            - name: ENABLE_TELEMETRY
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
