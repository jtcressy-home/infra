---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dograh-asterisk
  labels:
    app.kubernetes.io/name: dograh-asterisk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dograh-asterisk
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "macvlan-conf-dhcp",
              "namespace": "kube-system",
              "interface": "eth1",
              "mac": "02:8c:20:0c:1a:01"
            }
          ]
      labels:
        app.kubernetes.io/name: dograh-asterisk
    spec:
      automountServiceAccountToken: false
      containers:
        - name: asterisk
          image: ghcr.io/jtcressy/docker-asterisk:asterisk-22.9.0@sha256:bf7b44aa79128b82d9a21e8f3bbf1227e507599f1de90c57573245636ba1699e
          imagePullPolicy: IfNotPresent
          ports:
            - name: ari-http
              containerPort: 8088
              protocol: TCP
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
          envFrom:
            - secretRef:
                name: dograh-asterisk-env
          env:
            - name: ASTERISK_REQUIRE_UNIFI
              value: "true"
            - name: ASTERISK_ARI_USERNAME
              value: dograh
            - name: ASTERISK_STASIS_APP
              value: dograh
            - name: ASTERISK_WS_CLIENT_NAME
              value: dograh
            - name: DOGRAH_ARI_WS_URI
              value: ws://dograh-api.dograh.svc.cluster.local:8000/api/v1/telephony/ws/ari
            - name: ASTERISK_WS_TLS_ENABLED
              value: "no"
            - name: ASTERISK_HTTP_BINDADDR
              value: 0.0.0.0
            - name: ASTERISK_HTTP_PORT
              value: "8088"
            - name: ASTERISK_PJSIP_BINDADDR
              value: 192.168.20.11
            - name: ASTERISK_PJSIP_PORT
              value: "5060"
            - name: ASTERISK_RTP_START
              value: "10000"
            - name: ASTERISK_RTP_END
              value: "20000"
            - name: UNIFI_TALK_ENDPOINT
              value: unifi-talk
            - name: UNIFI_TALK_INBOUND_CONTEXT
              value: from-unifi-talk
            - name: UNIFI_TALK_OUTBOUND_CONTEXT
              value: from-dograh
            - name: UNIFI_TALK_SIP_PORT
              value: "5060"
            - name: DOGRAH_INBOUND_EXTENSION
              value: "7000"
          volumeMounts:
            - name: asterisk-templates
              mountPath: /etc/asterisk/templates
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "SETUID", "SETGID"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          startupProbe:
            exec:
              command: ["asterisk", "-rx", "core show version"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            exec:
              command: ["asterisk", "-rx", "core show version"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["asterisk", "-rx", "core show version"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: asterisk-templates
          configMap:
            name: dograh-asterisk-templates
