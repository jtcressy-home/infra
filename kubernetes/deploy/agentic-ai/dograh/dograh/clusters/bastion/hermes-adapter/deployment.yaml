---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dograh-hermes-adapter
  labels:
    app.kubernetes.io/name: dograh-hermes-adapter
    app.kubernetes.io/part-of: dograh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dograh-hermes-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dograh-hermes-adapter
        app.kubernetes.io/part-of: dograh
    spec:
      automountServiceAccountToken: false
      containers:
        - name: adapter
          image: ghcr.io/jtcressy/dograh-hermes-adapter:sha-4aa0f40@sha256:db289af83596aa7a62016264b7c1be1ca6253ea53b5c63f537de2f9ce4f28ed2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HERMES_BASE_URL
              value: http://hermes.hermes.svc.cluster.local:8642
            - name: HERMES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dograh-hermes-adapter-secret
                  key: HERMES_API_KEY
            - name: CALLER_WHITELIST
              valueFrom:
                configMapKeyRef:
                  name: dograh-hermes-adapter-config
                  key: CALLER_WHITELIST
            - name: REQUEST_TIMEOUT_SECONDS
              value: "60"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
