apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-cni
  namespace: argocd
spec:
  # Never cascade-delete the CNI when an Application disappears (2026-07-13
  # incident: a malformed commit briefly emptied the repo and cilium was
  # cascade-deleted, breaking all pod networking).
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  generators:
  - git:
      repoURL: https://github.com/jtcressy-home/infra
      revision: HEAD
      directories:
      - path: 'kubernetes/clusters/*/cni'
      values:
        cluster: '{{ index .path.segments 2 }}'
  template:
    metadata:
      name: '{{ .values.cluster }}-cni'
    spec:
      project: system
      source:
        repoURL: https://github.com/jtcressy-home/infra
        targetRevision: HEAD
        path: '{{.path.path}}'
        kustomize:
          namespace: kube-system
      destination:
        namespace: kube-system
        name: '{{ .values.cluster }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
